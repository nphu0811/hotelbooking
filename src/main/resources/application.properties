spring.application.name=HotelBooking
spring.config.import=optional:file:.env[.properties]
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# Datasource values must come from environment variables. Do not hardcode Railway URLs or passwords here.
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:${DATABASE_PUBLIC_URL}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.jackson.time-zone=UTC
logging.pattern.dateformat=yyyy-MM-dd'T'HH:mm:ss.SSSXXX,UTC
logging.pattern.level=%5p trace_id=%X{traceId:-} span_id=%X{spanId:-}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.health.mail.enabled=false
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# Railway/Flyway settings
spring.flyway.enabled=true
spring.h2.console.enabled=false
app.seed-demo-data=false
app.payment.provider=${APP_PAYMENT_PROVIDER:disabled}
app.payment.mock.enabled=false
app.email.provider=${APP_EMAIL_PROVIDER:disabled}
app.sms.provider=${APP_SMS_PROVIDER:disabled}
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}
hoteldata.overpass.endpoint=${HOTELDATA_OVERPASS_ENDPOINT:https://overpass-api.de/api/interpreter}
google.places.api-key=${GOOGLE_PLACES_API_KEY:}
google.places.enabled=${GOOGLE_PLACES_ENABLED:false}
geoapify.api-key=${GEOAPIFY_API_KEY:}
geoapify.enabled=${GEOAPIFY_ENABLED:false}
amadeus.client-id=${AMADEUS_CLIENT_ID:}
amadeus.client-secret=${AMADEUS_CLIENT_SECRET:}
openai.api.key=${OPENAI_API_KEY:${openai.api.key:}}

# VNPay settings
vnpay.tmn-code=${VNPAY_TMN_CODE:}
vnpay.hash-secret=${VNPAY_HASH_SECRET:}
vnpay.pay-url=${VNPAY_PAY_URL:}
vnpay.return-url=${VNPAY_RETURN_URL:}
vnpay.ipn-url=${VNPAY_IPN_URL:}

# Mail settings
mail.from=${MAIL_FROM:}

# SMS settings
brevo.api-key=${BREVO_API_KEY:}
brevo.sms.sender=${BREVO_SMS_SENDER:HotelBook}

# OAuth2 settings
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:mock-google-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:mock-google-secret}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:mock-facebook-id}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:mock-facebook-secret}
spring.security.oauth2.client.registration.facebook.scope=public_profile
spring.security.oauth2.client.registration.facebook.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
