spring.application.name=HotelBooking

# Datasource values must come from environment variables. Do not hardcode Railway URLs or passwords here.
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:${DATABASE_PUBLIC_URL:jdbc:postgresql://localhost:5432/hotelbooking}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:local-postgres-password}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.jackson.time-zone=UTC
logging.pattern.dateformat=yyyy-MM-dd'T'HH:mm:ss.SSSXXX,UTC

# Railway/Flyway settings
spring.flyway.enabled=true

# Mail settings
mail.host=${MAIL_HOST:smtp.gmail.com}
mail.port=${MAIL_PORT:587}
mail.username=${MAIL_USERNAME:YOUR_EMAIL}
mail.password=${MAIL_PASSWORD:YOUR_APP_PASSWORD}
mail.from=${MAIL_FROM:YOUR_EMAIL}

