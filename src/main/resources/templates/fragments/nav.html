<nav class="topbar" th:fragment="nav" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <a class="brand" th:href="@{/}">HotelBooking</a>
    <div class="nav-links">
        <a th:href="@{/rooms/search(checkIn=${T(java.time.LocalDate).now().plusDays(1)},checkOut=${T(java.time.LocalDate).now().plusDays(3)},guests=2)}">Tìm phòng</a>
        <a sec:authorize="isAuthenticated()" th:href="@{/account/bookings}">Lịch sử</a>
        <a sec:authorize="hasAnyRole('ADMIN','SUPER_ADMIN')" th:href="@{/admin}">Admin</a>
    </div>
    <div class="nav-auth">
        <a sec:authorize="isAnonymous()" th:href="@{/login}">Đăng nhập</a>
        <a sec:authorize="isAnonymous()" class="button button-small" th:href="@{/register}">Đăng ký</a>
        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="button button-small button-muted" type="submit">Đăng xuất</button>
        </form>
    </div>
</nav>
