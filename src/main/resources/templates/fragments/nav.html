<nav class="topbar" th:fragment="nav" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <a class="brand" th:href="@{/}">
        <img class="brand-logo" th:src="@{/favicon.svg}" alt="" aria-hidden="true">
        <span>LUMIÈRE HOTEL</span>
    </a>
    <button class="nav-menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav-panel"
            aria-label="Mở menu" data-nav-toggle>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
    </button>
    <div class="nav-panel" id="site-nav-panel" data-nav-panel>
        <div class="nav-links">
            <a th:href="@{/#rooms}">Destinations</a>
            <a th:href="@{/#hanoi}">Suites</a>
            <a th:href="@{/#ai-recommendation}">Experience</a>
            <a th:href="@{/#offers}">Offers</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/account/bookings}">My Stays</a>
            <a sec:authorize="hasAnyRole('ADMIN','SUPER_ADMIN')" th:href="@{/admin}">Admin</a>
        </div>
        <div class="nav-auth">
            <a sec:authorize="isAnonymous()" th:href="@{/login/password}">Đăng nhập</a>
            <a sec:authorize="isAnonymous()" th:href="@{/register}">Đăng ký</a>
            <a sec:authorize="isAuthenticated() and !hasAnyRole('ADMIN', 'SUPER_ADMIN')" th:href="@{/profile}">Hồ sơ</a>
            <a class="button button-small" th:href="@{/rooms/search(checkIn=${T(java.time.LocalDate).now().plusDays(1)},checkOut=${T(java.time.LocalDate).now().plusDays(3)},guests=2)}">Book Now</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="button button-small button-muted" type="submit">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>
