<nav class="topbar" th:fragment="nav" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <a class="brand" th:href="@{/}">
        <img class="brand-logo" th:src="@{/favicon.svg}" alt="" aria-hidden="true">
        <span>HotelBooking</span>
    </a>
    <button class="nav-menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav-panel"
            aria-label="Mở menu" data-nav-toggle>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
    </button>
    <div class="nav-panel" id="site-nav-panel" data-nav-panel>
        <div class="nav-links">
            <a th:href="@{/#rooms}" data-section-link="rooms">Tìm phòng</a>
            <a th:href="@{/#ai-recommendation}">Gợi ý AI</a>
            <a th:href="@{/#hanoi}">Hà Nội</a>
            <a th:href="@{/#tphcm}">TP. Hồ Chí Minh</a>
            <a th:href="@{/#danang}">Đà Nẵng</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/account/bookings}">Lịch sử</a>
            <a sec:authorize="hasAnyRole('ADMIN','SUPER_ADMIN')" th:href="@{/admin}">Admin</a>
        </div>
        <button class="theme-toggle" type="button" role="switch" aria-checked="false"
                aria-label="Chuyển sang chế độ tối" data-theme-toggle>
            <span class="theme-toggle-track" aria-hidden="true">
                <span class="theme-toggle-symbol theme-toggle-sun">☀</span>
                <span class="theme-toggle-symbol theme-toggle-moon">☾</span>
                <span class="theme-toggle-thumb"></span>
            </span>
            <span class="sr-only" data-theme-toggle-label>Chế độ sáng</span>
        </button>
        <div class="nav-auth">
            <a sec:authorize="isAnonymous()" th:href="@{/login}">Đăng nhập</a>
            <a sec:authorize="isAnonymous()" class="button button-small" th:href="@{/register}">Đăng ký</a>
            <a sec:authorize="isAuthenticated() and !hasAnyRole('ADMIN', 'SUPER_ADMIN')" th:href="@{/profile}">Hồ sơ</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="button button-small button-muted" type="submit">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>
