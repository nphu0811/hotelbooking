<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Register')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="auth-page">
    <form class="auth-panel" th:action="@{/register}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <p class="page-kicker">New guest</p>
        <h1>Đăng ký</h1>
        <p class="alert" th:if="${error}" th:text="${error}"></p>
        <label>Họ tên
            <input name="fullName" th:value="${fullName}" minlength="2" maxlength="100" required>
        </label>
        <label>Email
            <input name="email" type="email" th:value="${email}" required>
        </label>
        <label>Số điện thoại
            <input name="phone" th:value="${phone}" placeholder="0912345678" required>
        </label>
        <label>Mật khẩu
            <input name="password" type="password" required>
        </label>
        <label>Xác nhận mật khẩu
            <input name="confirmPassword" type="password" required>
        </label>
        <button class="button" type="submit">Tạo tài khoản</button>
    </form>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
