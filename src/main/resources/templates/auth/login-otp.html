<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Nhập OTP - LUMIÈRE HOTEL')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="auth-page">
    <div class="auth-shell">
        <aside class="auth-visual" aria-hidden="true">
            <div class="auth-visual-content">
                <p class="page-kicker">Secure access</p>
                <h1>One-time verification.</h1>
                <p>Your OTP keeps reservations and payments protected without merging password and OTP flows.</p>
            </div>
        </aside>
        <section class="auth-form-area">
            <div class="auth-panel">
                <p class="page-kicker">OTP code</p>
                <h1>Nhập mã xác thực</h1>
                <p class="muted auth-copy">
                    Chúng tôi đã gửi mã gồm 6 chữ số đến
                    <strong th:text="${maskedDestination}">email hoặc số điện thoại</strong>.
                </p>

                <p class="alert" th:if="${error}" th:text="${error}"></p>
                <p class="success" th:if="${message}" th:text="${message}"></p>

                <form th:action="@{/login/otp/verify}" method="post" data-validate="otp-code" novalidate>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="identifier" th:value="${identifier}">
                    <label class="form-field">Mã OTP
                        <input class="otp-input" name="otp" type="text" inputmode="numeric"
                               pattern="\d{6}" maxlength="6" placeholder="______"
                               autocomplete="one-time-code" data-validate-field="otp" required autofocus>
                        <span class="field-error" data-field-error="otp"></span>
                    </label>
                    <button class="button" type="submit">Đăng nhập</button>
                </form>

                <form class="auth-resend" th:action="@{/login/otp/request}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="identifier" th:value="${identifier}">
                    <button class="button button-muted button-small" type="submit">Gửi lại mã OTP</button>
                </form>

                <a class="auth-link" th:href="@{/login/otp}">Đổi email hoặc số điện thoại</a>
                <a class="auth-link" th:href="@{/login/password}">Đăng nhập bằng mật khẩu</a>
            </div>
        </section>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:src="@{/js/auth-validation.js(v=3)}"></script>
</body>
</html>
