<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="auth-page">
    <form class="auth-panel" th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <p class="page-kicker">Welcome back</p>
        <h1>Đăng nhập</h1>
        <p class="alert" th:if="${error}" th:text="${error}"></p>
        <p class="alert" th:if="${locked}">Tài khoản tạm thời bị khóa do đăng nhập sai nhiều lần. Vui lòng thử lại sau 15 phút.</p>
        <p class="success" th:if="${message}" th:text="${message}"></p>
        <label>Email
            <input name="username" type="email" autocomplete="username" required>
        </label>
        <label>Mật khẩu
            <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <div class="captcha-hook" th:if="${captchaRequired}">
            <span>CAPTCHA</span>
            <p class="muted">Bước xác minh bổ sung đang bật cho phiên đăng nhập này.</p>
        </div>
        <button class="button" type="submit">Đăng nhập</button>
        <a th:href="@{/register}">Tạo tài khoản mới</a>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
