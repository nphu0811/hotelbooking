<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Xác thực OTP - HotelBooking')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="auth-page">
    <section class="auth-panel">
        <p class="page-kicker">Mã OTP xác thực</p>
        <h1>Xác thực tài khoản</h1>
        <p class="muted auth-copy">
            Chúng tôi đã gửi mã xác thực gồm 6 chữ số đến email
            <strong th:text="${email}">email@example.com</strong>.
        </p>

        <p class="alert" th:if="${error}" th:text="${error}"></p>
        <p class="success" th:if="${message}" th:text="${message}"></p>

        <form th:action="@{/verification}" method="post" data-validate="otp-code" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label class="form-field">Mã xác thực OTP
                <input class="otp-input" name="otp" type="text" inputmode="numeric"
                       pattern="\d{6}" maxlength="6" placeholder="______"
                       autocomplete="one-time-code" data-validate-field="otp" required autofocus>
                <span class="field-error" data-field-error="otp"></span>
            </label>
            <button class="button" type="submit">Xác thực tài khoản</button>
        </form>

        <div class="auth-resend-block">
            <p class="muted">Không nhận được mã hoặc mã hết hạn?</p>
            <form th:action="@{/verification/resend}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="button button-muted button-small" type="submit">Gửi lại mã OTP</button>
            </form>
        </div>
    </section>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:src="@{/js/auth-validation.js(v=1)}"></script>
</body>
</html>
