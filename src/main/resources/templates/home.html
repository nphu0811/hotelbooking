<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('HotelBooking')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="home-shell">
    <section class="hero">
        <div class="hero-copy">
            <p class="eyebrow">Đặt phòng khách sạn Việt Nam</p>
            <h1>Stay closer to the best days.</h1>
            <p>Khám phá phòng trống, giữ chỗ an toàn 15 phút và hoàn tất thanh toán sandbox trong một trải nghiệm đặt phòng tinh gọn.</p>
        </div>
        <form class="search-panel" th:action="@{/rooms/search}" method="get">
            <label>Địa điểm hoặc khách sạn
                <input name="q" placeholder="Hà Nội, Đà Nẵng, Đà Lạt">
            </label>
            <div class="form-grid">
                <label>Nhận phòng
                    <input type="date" name="checkIn" th:value="${checkIn}" required>
                </label>
                <label>Trả phòng
                    <input type="date" name="checkOut" th:value="${checkOut}" required>
                </label>
                <label>Số khách
                    <input type="number" name="guests" min="1" max="10" th:value="${guests}" required>
                </label>
            </div>
            <button class="button" type="submit">Tìm phòng</button>
        </form>
    </section>

    <section class="section">
        <div class="section-heading">
            <div>
                <p class="page-kicker">Selected stays</p>
                <h2>Phòng nổi bật</h2>
            </div>
            <a class="button button-muted" th:href="@{/rooms/search(checkIn=${checkIn},checkOut=${checkOut},guests=${guests})}">Xem tất cả</a>
        </div>
        <div class="room-grid" th:if="${rooms != null and !rooms.isEmpty()}">
            <article class="room-card" th:each="room : ${rooms.content}">
                <img th:src="${room.primaryImageUrl != null ? room.primaryImageUrl : '/css/room-placeholder.svg'}" th:alt="${room.name}">
                <div class="room-card-body">
                    <h3 th:text="${room.name}">Room</h3>
                    <p class="muted" th:text="${room.hotel.name + ' - ' + room.hotel.city}">Hotel</p>
                    <p class="source-note" th:if="${room.hotel.source != null}" th:text="${'Source: ' + room.hotel.source}">Source</p>
                    <p class="price" th:text="${#numbers.formatDecimal(room.pricePerNight,0,'COMMA',0,'POINT') + ' VND / đêm'}">0</p>
                    <a class="button button-muted" th:href="@{/rooms/{id}(id=${room.id})}">Chi tiết</a>
                </div>
            </article>
        </div>
        <p class="empty" th:if="${rooms == null or rooms.isEmpty()}">Chưa có phòng phù hợp.</p>
    </section>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
