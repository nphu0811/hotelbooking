<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý phòng')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="page admin-page admin-dashboard">
    <header class="page-header">
        <div>
            <p class="page-kicker">Quản trị / Khách sạn / Phòng</p>
            <h1 th:text="${'Quản lý phòng — ' + hotel.name}">Quản lý phòng</h1>
            <p class="muted">
                <a th:href="@{/admin/hotels}">Khách sạn</a>
                <span> / </span>
                <span th:text="${hotel.name}">Tên khách sạn</span>
                <span> / Phòng</span>
            </p>
        </div>
        <a class="button button-muted" th:href="@{/admin/hotels}">← Danh sách khách sạn</a>
    </header>

    <p class="alert" th:if="${error}" th:text="${error}"></p>
    <p class="success" th:if="${param.created}">Đã tạo phòng.</p>
    <p class="success" th:if="${param.updated}">Đã cập nhật phòng.</p>
    <p class="success" th:if="${param.deleted}">Đã xóa phòng.</p>

    <!-- Collapsible Add Room Form -->
    <details class="ops-panel" style="margin-bottom: 24px; padding: 24px;">
        <summary class="button" style="cursor: pointer; list-style: none; display: inline-flex; gap: 8px; outline: none; user-select: none;">
            <span>+ Thêm phòng mới</span>
        </summary>
        <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--color-border);">
            <form th:action="@{/admin/hotels/{hotelId}/rooms(hotelId=${hotel.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-grid">
                    <label>Tên phòng
                        <input name="name" placeholder="Ví dụ: Phòng Deluxe" required>
                    </label>
                    <label>Loại phòng
                        <input name="roomType" placeholder="Ví dụ: Deluxe" required>
                    </label>
                    <label>Sức chứa
                        <input name="capacity" type="number" min="1" max="20" value="2" required>
                    </label>
                    <label>Giá mỗi đêm (VND)
                        <input name="pricePerNight" type="number" min="1" placeholder="1500000" required>
                    </label>
                </div>
                <button class="button" type="submit" style="margin-top: 20px;">Tạo phòng</button>
            </form>
        </div>
    </details>

    <!-- Full-width Room List Section -->
    <section class="ops-panel" style="width: 100%; padding: 24px;">
        <div class="panel-title" style="margin-bottom: 20px;">
            <h2>Danh sách phòng</h2>
            <span class="page-kicker" th:text="${rooms.totalElements + ' phòng'}">0 phòng</span>
        </div>

        <p class="empty" th:if="${rooms.empty}">Chưa có phòng nào cho khách sạn này.</p>

        <div class="mini-list" th:if="${!rooms.empty}" style="display: flex; flex-direction: column; gap: 16px;">
            <article th:each="room : ${rooms.content}" style="display: grid; grid-template-columns: 1fr 150px 240px; align-items: center; gap: 16px; padding: 16px; border-bottom: 1px solid var(--color-border);">
                <div>
                    <strong th:text="${room.name}" style="font-size: 18px; color: var(--color-primary);">Tên phòng</strong>
                    <div style="font-size: 13px; color: var(--color-text-soft); margin-top: 4px;">
                        <span th:text="${room.roomType}">Loại</span>
                        <span> · </span>
                        <span th:text="${room.capacity + ' khách'}">Sức chứa</span>
                    </div>
                </div>
                <div>
                    <div style="font-weight: 700; color: var(--color-primary);" th:text="${#numbers.formatDecimal(room.pricePerNight,0,'COMMA',0,'POINT') + ' VND / đêm'}">0 VND</div>
                    <div style="margin-top: 4px;">
                        <span th:replace="~{fragments/i18n :: roomStatus(${room.status})}">Còn phòng</span>
                    </div>
                </div>
                <div style="display: flex; flex-direction: column; gap: 8px; justify-self: end; width: 100%; max-width: 240px;">
                    <details style="width: 100%;">
                        <summary class="button button-small button-muted" style="list-style: none; cursor: pointer; text-align: center; width: 100%;">Chỉnh sửa</summary>
                        <div style="margin-top: 12px; padding: 12px; border: 1px solid var(--color-border); border-radius: var(--radius-sm); background: var(--color-bg-soft);">
                            <form th:action="@{/admin/hotels/{hotelId}/rooms/{roomId}(hotelId=${hotel.id},roomId=${room.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <div style="display: flex; flex-direction: column; gap: 8px;">
                                    <label style="font-size: 12px; color: var(--color-text-muted);">Giá / đêm (VND)
                                        <input type="number" name="price" th:value="${room.pricePerNight}" min="1" style="width: 100%; height: 36px; padding: 0 8px; font-size: 13px;">
                                    </label>
                                    <label style="font-size: 12px; color: var(--color-text-muted);">Trạng thái
                                        <select name="status" style="width: 100%; height: 36px; padding: 0 8px; font-size: 13px;">
                                            <option th:each="s : ${statuses}"
                                                    th:value="${s}"
                                                    th:selected="${s == room.status}"
                                                    th:text="${s.name() == 'AVAILABLE' ? 'Còn phòng' : 'Bảo trì'}">Còn phòng</option>
                                        </select>
                                    </label>
                                    <button class="button button-small" type="submit" style="width: 100%; min-height: 36px; margin-top: 4px;">Lưu thay đổi</button>
                                </div>
                            </form>
                            <form th:action="@{/admin/hotels/{hotelId}/rooms/{roomId}/delete(hotelId=${hotel.id},roomId=${room.id})}"
                                  method="post"
                                  onsubmit="return confirm('Xóa phòng này?');"
                                  style="margin-top: 8px;">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="button button-small button-danger" type="submit" style="width: 100%; min-height: 36px; color: white;">Xóa phòng</button>
                            </form>
                        </div>
                    </details>
                </div>
            </article>
        </div>
    </section>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
