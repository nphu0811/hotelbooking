<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Room management')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="page admin-page">
    <header class="page-header">
        <div>
            <p class="page-kicker">Inventory</p>
            <h1>Quản lý phòng</h1>
        </div>
    </header>
    <p class="alert" th:if="${error}" th:text="${error}"></p>
    <div class="table-wrap">
        <table>
            <thead><tr><th>Phòng</th><th>Khách sạn</th><th>Giá</th><th>Trạng thái</th><th>Cập nhật</th></tr></thead>
            <tbody>
            <tr th:each="room : ${rooms.content}">
                <td th:text="${room.name}">Room</td>
                <td th:text="${room.hotel != null ? room.hotel.name : '-'}">Hotel</td>
                <td th:text="${#numbers.formatDecimal(room.pricePerNight,0,'COMMA',0,'POINT')}">0</td>
                <td><span class="badge" th:text="${room.status}">Status</span></td>
                <td>
                    <form class="inline-form" th:action="@{/admin/rooms/{id}(id=${room.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="number" name="price" th:value="${room.pricePerNight}">
                        <select name="status">
                            <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}" th:selected="${status == room.status}">AVAILABLE</option>
                        </select>
                        <button class="button button-small" type="submit">Lưu</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
