<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý đặt phòng')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="page admin-page">
    <header class="page-header">
        <div>
            <p class="page-kicker">Vận hành lưu trú</p>
            <h1>Quản lý đặt phòng</h1>
        </div>
    </header>
    <div class="table-wrap">
        <table>
            <thead><tr><th>Mã</th><th>Khách</th><th>Phòng</th><th>Ngày</th><th>Trạng thái</th><th>Hành động</th></tr></thead>
            <tbody>
            <tr th:each="booking : ${bookings.content}">
                <td th:text="${booking.bookingCode}">HB</td>
                <td th:text="${booking.user.fullName}">Khách</td>
                <td th:text="${booking.room.name}">Phòng</td>
                <td th:text="${booking.checkIn + ' → ' + booking.checkOut}">Ngày</td>
                <td><span th:replace="~{fragments/i18n :: bookingStatus(${booking.status})}">Trạng thái</span></td>
                <td class="actions">
                    <form th:if="${booking.status.name() == 'CONFIRMED'}" th:action="@{/admin/bookings/{id}/check-in(id=${booking.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="button button-small" type="submit">Nhận phòng</button>
                    </form>
                    <form th:if="${booking.status.name() == 'CHECKED_IN'}" th:action="@{/admin/bookings/{id}/check-out(id=${booking.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="button button-small" type="submit">Trả phòng</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
