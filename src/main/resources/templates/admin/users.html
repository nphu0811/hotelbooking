<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quản lý người dùng</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="page admin-page">
    <header class="page-header">
        <div>
            <p class="page-kicker">Access control</p>
            <h1>Quản lý người dùng</h1>
        </div>
    </header>
    <div class="table-wrap">
        <table>
            <thead><tr><th>Họ tên</th><th>Email</th><th>Trạng thái</th><th>Role</th><th>Hành động</th></tr></thead>
            <tbody>
            <tr th:each="user : ${users.content}">
                <td th:text="${user.fullName}">User</td>
                <td th:text="${user.email}">email</td>
                <td><span class="badge" th:text="${user.status}">Status</span></td>
                <td><span th:each="role : ${user.roles}" th:text="${role.code + ' '}">USER</span></td>
                <td class="actions">
                    <form th:if="${user.status.name() != 'LOCKED'}" th:action="@{/admin/users/{id}/lock(id=${user.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="reason" value="Admin lock">
                        <button class="button button-small button-danger" type="submit">Khóa</button>
                    </form>
                    <form th:if="${user.status.name() == 'LOCKED'}" th:action="@{/admin/users/{id}/unlock(id=${user.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="button button-small" type="submit">Mở khóa</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
