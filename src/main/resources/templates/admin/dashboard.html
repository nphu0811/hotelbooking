<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="page">
    <h1>Admin dashboard</h1>
    <div class="admin-grid">
        <a class="admin-tile" th:href="@{/admin/rooms}"><strong th:text="${rooms.totalElements}">0</strong><span>Phòng</span></a>
        <a class="admin-tile" th:href="@{/admin/bookings}"><strong th:text="${bookings.totalElements}">0</strong><span>Booking</span></a>
        <a class="admin-tile" th:href="@{/admin/users}"><strong th:text="${users.totalElements}">0</strong><span>Người dùng</span></a>
    </div>
</main>
</body>
</html>
