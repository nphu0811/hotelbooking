<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Payment result')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="page narrow payment-panel">
    <header class="page-header">
        <p class="page-kicker">Payment result</p>
        <h1>Kết quả thanh toán</h1>
    </header>
    <p class="alert" th:if="${error}" th:text="${error}"></p>
    <div class="summary" th:if="${payment}">
        <p><strong>Order ID:</strong> <span th:text="${payment.orderId}">order</span></p>
        <p><strong>Trạng thái payment:</strong> <span class="badge" th:text="${payment.status}">status</span></p>
        <p><strong>Trạng thái booking:</strong> <span class="badge" th:text="${booking.status}">status</span></p>
        <p><strong>Mã booking:</strong> <span th:text="${booking.bookingCode}">code</span></p>
    </div>
        <a class="button" th:href="@{/account/bookings}" aria-label="history">Xem lịch sử đặt phòng</a>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
