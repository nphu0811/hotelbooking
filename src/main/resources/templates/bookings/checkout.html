<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thanh toán</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="page narrow checkout-panel">
    <header class="page-header">
        <p class="page-kicker">Checkout</p>
        <h1>Xác nhận đặt phòng</h1>
        <p>Kiểm tra thông tin giữ chỗ trước khi chuyển sang cổng thanh toán sandbox.</p>
    </header>
    <div class="summary">
        <p><strong>Mã giữ chỗ:</strong> <span th:text="${booking.bookingCode}">HB</span></p>
        <p><strong>Phòng:</strong> <span th:text="${booking.room.name}">Room</span></p>
        <p><strong>Khách sạn:</strong> <span th:text="${booking.room.hotel.name}">Hotel</span></p>
        <p><strong>Ngày:</strong> <span th:text="${booking.checkIn + ' -> ' + booking.checkOut}">Dates</span></p>
        <p><strong>Số khách:</strong> <span th:text="${booking.guestCount}">2</span></p>
        <p><strong>Tổng tiền:</strong> <span class="price" th:text="${#numbers.formatDecimal(booking.totalAmount,0,'COMMA',0,'POINT') + ' VND'}">0</span></p>
        <p><strong>Hết hạn giữ chỗ:</strong> <span th:text="${booking.expiresAt}">time</span></p>
    </div>
    <form th:action="@{/payments/mock/start/{id}(id=${booking.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="button" type="submit">Thanh toán mock sandbox</button>
    </form>
</main>
</body>
</html>
