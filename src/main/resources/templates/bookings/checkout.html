<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Checkout')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="page narrow checkout-panel">
    <header class="page-header">
        <p class="page-kicker">Checkout</p>
        <h1>Xac nhan dat phong</h1>
        <p>Kiem tra thong tin giu cho truoc khi chuyen sang cong thanh toan.</p>
    </header>
    <div class="summary">
        <p><strong>Ma giu cho:</strong> <span th:text="${booking.bookingCode}">HB</span></p>
        <p><strong>Phong:</strong> <span th:text="${booking.room.name}">Room</span></p>
        <p><strong>Khach san:</strong> <span th:text="${booking.room.hotel.name}">Hotel</span></p>
        <p><strong>Ngay:</strong> <span th:text="${booking.checkIn + ' -> ' + booking.checkOut}">Dates</span></p>
        <p><strong>So khach:</strong> <span th:text="${booking.guestCount}">2</span></p>
        <p><strong>Tong tien:</strong> <span class="price" th:text="${#numbers.formatDecimal(booking.totalAmount,0,'COMMA',0,'POINT') + ' VND'}">0</span></p>
        <p><strong>Het han giu cho:</strong> <span th:text="${booking.expiresAt}">time</span></p>
    </div>
    <form th:if="${paymentProviderConfigured}" th:action="@{/payments/start/{id}(id=${booking.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="button" type="submit">Continue to payment</button>
    </form>
    <p class="alert" th:unless="${paymentProviderConfigured}">Payment provider is not configured for this environment.</p>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
