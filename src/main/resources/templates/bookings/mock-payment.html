<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Mock payment')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="page narrow payment-panel">
    <header class="page-header">
        <p class="page-kicker">Sandbox gateway</p>
        <h1>Cong thanh toan mock</h1>
        <p class="muted">Local/dev/test only. This page never moves real money.</p>
    </header>
    <div class="summary">
        <p><strong>Order ID:</strong> <span th:text="${orderId}">order</span></p>
    </div>
    <div class="mock-actions">
        <form th:action="@{/payments/mock/callback}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="orderId" th:value="${orderId}">
            <input type="hidden" name="success" value="true">
            <button class="button" type="submit">Mark paid</button>
        </form>
        <form th:action="@{/payments/mock/callback}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="orderId" th:value="${orderId}">
            <input type="hidden" name="success" value="false">
            <button class="button button-danger" type="submit">Mark failed</button>
        </form>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
