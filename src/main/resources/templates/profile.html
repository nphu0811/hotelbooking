<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Hồ sơ cá nhân - HotelBooking')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="auth-page">
    <section class="auth-panel profile-panel">
        <p class="page-kicker">Thông tin tài khoản</p>
        <h1>Hồ sơ của bạn</h1>

        <p class="alert" th:if="${error}" th:text="${error}"></p>
        <p class="success" th:if="${message}" th:text="${message}"></p>

        <form th:action="@{/profile}" method="post" data-validate="profile" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label class="form-field">Họ và tên
                <input name="fullName" type="text" th:value="${user.fullName}"
                       minlength="2" maxlength="100" data-validate-field="fullName" required>
                <span class="field-error" data-field-error="fullName"></span>
            </label>

            <label class="form-field">Email
                <input name="email" type="email" th:value="${user.email}"
                       data-validate-field="email" autocomplete="email" required>
                <span class="field-error" data-field-error="email"></span>
            </label>

            <label class="form-field">Số điện thoại
                <input name="phone" type="tel" th:value="${user.phone}"
                       placeholder="0912345678" data-validate-field="phone" autocomplete="tel" required>
                <span class="field-error" data-field-error="phone"></span>
            </label>

            <fieldset class="profile-fieldset">
                <legend>Đổi mật khẩu</legend>
                <label class="form-field">Mật khẩu hiện tại
                    <input name="currentPassword" type="password" autocomplete="current-password"
                           data-validate-field="currentPassword">
                    <span class="field-error" data-field-error="currentPassword"></span>
                </label>
                <label class="form-field">Mật khẩu mới
                    <input name="newPassword" type="password" autocomplete="new-password"
                           data-validate-field="optionalStrongPassword">
                    <span class="field-error" data-field-error="newPassword"></span>
                </label>
                <label class="form-field">Xác nhận mật khẩu mới
                    <input name="confirmPassword" type="password" autocomplete="new-password"
                           data-validate-field="optionalConfirmPassword" data-match-field="newPassword">
                    <span class="field-error" data-field-error="confirmPassword"></span>
                </label>
            </fieldset>

            <button class="button" type="submit">Cập nhật thông tin</button>
        </form>

        <div class="verification-panel">
            <div class="verification-item">
                <div>
                    <strong>Email</strong>
                    <p th:text="${user.email}">email@example.com</p>
                </div>
                <span class="verify-badge verified" th:if="${user.emailVerified}">Verified</span>
                <form th:if="${!user.emailVerified}" th:action="@{/profile/verify-email/request}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="verify-badge not-verified" type="submit">Not verified</button>
                </form>
            </div>
            <form class="otp-inline" th:if="${showEmailOtp}" th:action="@{/profile/verify-email}" method="post"
                  data-validate="otp-code" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label class="form-field">OTP email
                    <input name="otp" type="text" inputmode="numeric" maxlength="6" data-validate-field="otp" required>
                    <span class="field-error" data-field-error="otp"></span>
                </label>
                <button class="button button-small" type="submit">Xác thực email</button>
            </form>

            <div class="verification-item">
                <div>
                    <strong>Số điện thoại</strong>
                    <p th:text="${user.phone}">0912345678</p>
                </div>
                <span class="verify-badge verified" th:if="${user.phoneVerified}">Verified</span>
                <form th:if="${!user.phoneVerified}" th:action="@{/profile/verify-phone/request}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="verify-badge not-verified" type="submit">Not verified</button>
                </form>
            </div>
            <form class="otp-inline" th:if="${showPhoneOtp}" th:action="@{/profile/verify-phone}" method="post"
                  data-validate="otp-code" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label class="form-field">OTP số điện thoại
                    <input name="otp" type="text" inputmode="numeric" maxlength="6" data-validate-field="otp" required>
                    <span class="field-error" data-field-error="otp"></span>
                </label>
                <button class="button button-small" type="submit">Xác thực số điện thoại</button>
            </form>
        </div>
    </section>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:src="@{/js/auth-validation.js(v=1)}"></script>
</body>
</html>
