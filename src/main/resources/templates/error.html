<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Error')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="page error-page">
    <section class="error-card">
        <p class="page-kicker">Request stopped</p>
        <h1>Không thể thực hiện thao tác</h1>
        <p class="alert" th:text="${error ?: 'Đã có lỗi xảy ra'}">Error</p>
        <a class="button button-muted" th:href="@{/}">Về trang chủ</a>
    </section>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
