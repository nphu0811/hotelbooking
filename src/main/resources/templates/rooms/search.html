<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Kết quả tìm kiếm')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="page">
    <header class="page-header">
        <p class="page-kicker">Phòng trống</p>
        <h1>Kết quả tìm kiếm</h1>
        <p th:if="${rooms != null}" th:text="${rooms.totalElements + ' phòng phù hợp với lịch trình của bạn'}">0 phòng phù hợp</p>
    </header>

    <form class="toolbar" th:action="@{/rooms/search}" method="get" aria-label="Tìm kiếm phòng trống">
        <input name="q" th:value="${q}" placeholder="Địa điểm / khách sạn">
        <input type="date" name="checkIn" th:value="${checkIn}" aria-label="Ngày nhận phòng" required>
        <input type="date" name="checkOut" th:value="${checkOut}" aria-label="Ngày trả phòng" required>
        <input type="number" name="guests" min="1" max="10" th:value="${guests}" aria-label="Số khách" required>
        <input type="number" name="minPrice" th:value="${minPrice}" placeholder="Giá từ">
        <input type="number" name="maxPrice" th:value="${maxPrice}" placeholder="Giá đến">
        <select name="sort" aria-label="Sắp xếp kết quả">
            <option value="rating" th:selected="${sort == 'rating'}">Đánh giá</option>
            <option value="price_asc" th:selected="${sort == 'price_asc'}">Giá tăng</option>
            <option value="price_desc" th:selected="${sort == 'price_desc'}">Giá giảm</option>
            <option value="newest" th:selected="${sort == 'newest'}">Mới nhất</option>
        </select>
        <button class="button" type="submit">Lọc</button>
    </form>

    <p class="alert" th:if="${error}" th:text="${error}"></p>
    <div class="room-list" th:if="${rooms != null and !rooms.isEmpty()}">
        <article class="room-row" th:each="room : ${rooms.content}">
            <img th:src="${room.primaryImageUrl != null ? room.primaryImageUrl : '/css/room-placeholder.svg'}" th:alt="${room.name}">
            <div>
                <h2 th:text="${room.name}">Room</h2>
                <p th:text="${room.hotel.name + ' - ' + room.hotel.address}">Address</p>
                <p class="source-note" th:if="${room.hotel.source != null}">
                    <span th:text="${'Nguồn: ' + room.hotel.source}">Source</span>
                    <a th:if="${room.hotel.sourceUrl != null}" th:href="${room.hotel.sourceUrl}" rel="nofollow noopener" target="_blank">chi tiết</a>
                    <a th:if="${room.hotel.latitude != null and room.hotel.longitude != null}"
                       th:href="${'https://www.openstreetmap.org/?mlat=' + room.hotel.latitude + '&mlon=' + room.hotel.longitude + '#map=16/' + room.hotel.latitude + '/' + room.hotel.longitude}"
                       rel="nofollow noopener" target="_blank">bản đồ</a>
                </p>
                <p class="muted" th:text="${'Sức chứa ' + room.capacity + ' khách - ' + room.roomType}">Type</p>
                <div class="chips">
                    <span th:each="amenity : ${room.amenities}" th:text="${amenity.name}">Amenity</span>
                </div>
            </div>
            <div class="row-side">
                <strong th:text="${#numbers.formatDecimal(room.pricePerNight,0,'COMMA',0,'POINT') + ' VND'}">0</strong>
                <span th:text="${'★ ' + room.averageRating + ' (' + room.reviewCount + ')'}">Rating</span>
                <a class="button button-muted" th:href="@{/rooms/{id}(id=${room.id})}" aria-label="Detail">Chi tiết</a>
            </div>
        </article>
    </div>
    <p class="empty" th:if="${rooms == null or rooms.isEmpty()}">Không có phòng trống trong khoảng thời gian này.</p>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
