spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.h2.console.enabled=false

app.seed-demo-data=false

app.payment.provider=${APP_PAYMENT_PROVIDER}
app.payment.mock.enabled=false
vnpay.tmn-code=${VNPAY_TMN_CODE:}
vnpay.hash-secret=${VNPAY_HASH_SECRET:}
vnpay.pay-url=${VNPAY_PAY_URL:}
vnpay.return-url=${VNPAY_RETURN_URL:}
vnpay.ipn-url=${VNPAY_IPN_URL:}
app.email.provider=${APP_EMAIL_PROVIDER:brevo}
app.sms.provider=${APP_SMS_PROVIDER:brevo}
app.public-base-url=${APP_PUBLIC_BASE_URL}
brevo.api-key=${BREVO_API_KEY:}
brevo.sms.sender=${BREVO_SMS_SENDER:HotelBook}
mail.from=${MAIL_FROM:}

hoteldata.overpass.endpoint=${HOTELDATA_OVERPASS_ENDPOINT:https://overpass-api.de/api/interpreter}
google.places.api-key=${GOOGLE_PLACES_API_KEY:}
google.places.enabled=${GOOGLE_PLACES_ENABLED:false}
geoapify.api-key=${GEOAPIFY_API_KEY:}
geoapify.enabled=${GEOAPIFY_ENABLED:false}
amadeus.client-id=${AMADEUS_CLIENT_ID:}
amadeus.client-secret=${AMADEUS_CLIENT_SECRET:}

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.health.mail.enabled=false
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
logging.pattern.level=%5p trace_id=%X{traceId:-} span_id=%X{spanId:-}
