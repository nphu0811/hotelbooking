spring.datasource.url=jdbc:h2:mem:hotelbooking;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
logging.pattern.dateformat=yyyy-MM-dd'T'HH:mm:ss.SSSXXX,UTC

spring.flyway.enabled=false

spring.h2.console.enabled=true
app.seed-demo-data=true
app.payment.provider=mock
app.payment.mock.enabled=true
app.payment.mock-signature=local-test-payment-signature
app.email.provider=console
app.sms.provider=console
